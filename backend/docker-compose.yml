version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: gmail_cleanup_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gmail_cleanup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gmail_cleanup_redis
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: gmail_cleanup_backend
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data: